name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump to apply when version is empty."
        required: true
        default: "patch"
        type: choice
        options:
          - major
          - minor
          - patch
      version:
        description: "Explicit release version, for example 1.0.0. Leave empty to auto-bump."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      create-tag: ${{ steps.release.outputs.create-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Prepare release version
        id: release
        env:
          INPUT_BUMP: ${{ inputs.bump }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          git fetch --force --tags

          VERSION_NAME="$(echo "${INPUT_VERSION#v}" | xargs)"
          BUMP="${INPUT_BUMP:-patch}"

          if [[ -z "${VERSION_NAME}" ]]; then
            LATEST_VERSION="$(
              git tag -l 'v*' \
                | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                | sed -E 's/^v//' \
                | sort -V \
                | tail -n 1 \
                || true
            )"
            if [[ -z "${LATEST_VERSION}" ]]; then
              VERSION_NAME="1.0.0"
              echo "No existing release tags found; using ${VERSION_NAME}."
            else
              IFS='.' read -r MAJOR MINOR PATCH <<< "${LATEST_VERSION}"
              case "${BUMP}" in
                major)
                  MAJOR=$((MAJOR + 1))
                  MINOR=0
                  PATCH=0
                  ;;
                minor)
                  MINOR=$((MINOR + 1))
                  PATCH=0
                  ;;
                patch)
                  PATCH=$((PATCH + 1))
                  ;;
                *)
                  echo "Unsupported bump: ${BUMP}" >&2
                  exit 1
                  ;;
              esac
              VERSION_NAME="${MAJOR}.${MINOR}.${PATCH}"
            fi
          fi

          TAG_NAME="v${VERSION_NAME}"

          if [[ ! "${VERSION_NAME}" =~ ^[1-9][0-9]*\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid release version for native packaging: ${VERSION_NAME}" >&2
            echo "Use a numeric version like 1.0.0. Native installers do not accept a zero major version." >&2
            exit 1
          fi

          CREATE_TAG="true"
          TAG_SHA="$(git rev-list -n 1 "${TAG_NAME}" 2>/dev/null || true)"
          if [[ -n "${TAG_SHA}" ]]; then
            if [[ "${TAG_SHA}" != "${GITHUB_SHA}" ]]; then
              echo "Release tag already exists on another commit: ${TAG_NAME}" >&2
              exit 1
            fi
            CREATE_TAG="false"
            echo "Release tag already exists on current commit and will be reused: ${TAG_NAME}"
          fi

          {
            echo "version=${VERSION_NAME}"
            echo "tag=${TAG_NAME}"
            echo "create-tag=${CREATE_TAG}"
          } >> "${GITHUB_OUTPUT}"

          echo "Preparing release ${VERSION_NAME} (${TAG_NAME})"

  check:
    name: Build and test
    runs-on: ubuntu-latest
    needs: prepare-release
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: corretto
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Run build checks
        run: ./gradlew --no-daemon check -PAPP_VERSION="${{ needs.prepare-release.outputs.version }}"

  package:
    name: Package ${{ matrix.name }}
    needs:
      - prepare-release
      - check
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            task: :desktopApp:packageDmg
            artifact: yggdrasil-macos
            pattern: desktopApp/build/compose/binaries/**/*.dmg
          - name: Windows
            os: windows-latest
            task: :desktopApp:packageMsi
            artifact: yggdrasil-windows
            pattern: desktopApp/build/compose/binaries/**/*.msi
          - name: Linux
            os: ubuntu-latest
            task: :desktopApp:packageDeb
            artifact: yggdrasil-linux
            pattern: desktopApp/build/compose/binaries/**/*.deb
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up JDK
        uses: actions/setup-java@v5.2.0
        with:
          distribution: corretto
          java-version: "21"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.1.0

      - name: Install Linux packaging tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install --yes fakeroot

      - name: Install WiX Toolset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install wixtoolset --no-progress --yes
          $wixRoot = Get-ChildItem "${env:ProgramFiles(x86)}" -Directory -Filter "WiX Toolset*" |
            Sort-Object Name -Descending |
            Select-Object -First 1
          if ($null -eq $wixRoot) {
            throw "WiX Toolset installation directory was not found."
          }
          Join-Path $wixRoot.FullName "bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Build native package
        run: ./gradlew --no-daemon ${{ matrix.task }} -PAPP_VERSION="${{ needs.prepare-release.outputs.version }}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.pattern }}
          if-no-files-found: error

  release:
    name: Create draft release
    runs-on: ubuntu-latest
    needs:
      - prepare-release
      - package
    timeout-minutes: 15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release tag
        if: needs.prepare-release.outputs.create-tag == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ needs.prepare-release.outputs.tag }}" -m "Release ${{ needs.prepare-release.outputs.version }}"
          git push origin "${{ needs.prepare-release.outputs.tag }}"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ needs.prepare-release.outputs.tag }}
          VERSION_NAME: ${{ needs.prepare-release.outputs.version }}
        run: |
          set -euo pipefail
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            echo "Release ${TAG_NAME} already exists; uploading assets."
          else
            gh release create "${TAG_NAME}" \
              --draft \
              --title "Yggdrasil ${VERSION_NAME}" \
              --notes "Unsigned desktop packages for Yggdrasil ${VERSION_NAME}."
          fi
          gh release upload "${TAG_NAME}" release-assets/* --clobber
